<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top-Down Laser Shooter with Raycast Intersection</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #222; border: 2px solid #444; cursor: crosshair; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 800;
        canvas.height = 600;

        // Game Objects
        const player = { x: canvas.width / 2, y: canvas.height / 2, radius: 15, speed: 4 };
        const keys = {};
        let mouseX = 0, mouseY = 0;
        
        // Target Players (Blue Circles)
        let dummyPlayers = [
            { id: 1, x: 150, y: 150, radius: 15 },
            { id: 2, x: 650, y: 150, radius: 15 },
            { id: 3, x: 200, y: 450, radius: 15 },
            { id: 4, x: 600, y: 450, radius: 15 }
        ];

        // Semi-Auto Weapon Variables
        let laserTimer = 0;          // How long the yellow flash stays on screen
        const laserDuration = 8;    // Frames the yellow laser remains visible
        let activeLaserEnd = { x: 0, y: 0 }; // Stores exactly where the laser stops

        // Input Listeners
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);
        window.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        
        // Semi-automatic trigger
        window.addEventListener("mousedown", (e) => {
            if (e.button === 0 && laserTimer === 0) { 
                laserTimer = laserDuration;
                calculateLaserPath();
            }
        });

        // Processes laser line calculation and handles collision stopping
        function calculateLaserPath() {
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            const maxLaserLength = 2000; // Projects far off-screen
            
            let targetX = player.x + Math.cos(angle) * maxLaserLength;
            let targetY = player.y + Math.sin(angle) * maxLaserLength;
            
            let closestDistance = maxLaserLength;
            let hitPlayerId = null;

            // Check every single player to find the absolute closest one intersecting the beam
            dummyPlayers.forEach(p => {
                // Vector math to project the circle center onto the laser ray line
                const rayX = Math.cos(angle);
                const rayY = Math.sin(angle);
                
                const toCircleX = p.x - player.x;
                const toCircleY = p.y - player.y;
                
                // Projection distance along the laser line
                const projection = toCircleX * rayX + toCircleY * rayY;
                
                // If the circle is behind the player, ignore it
                if (projection < 0) return;
                
                // Closest point coordinates on the infinite laser line
                const closestLineX = player.x + rayX * projection;
                const closestLineY = player.y + rayY * projection;
                
                // Distance from circle center to the line
                const distanceToLine = Math.hypot(p.x - closestLineX, p.y - closestLineY);
                
                // If it passes through the circle radius, it is a valid hit trace
                if (distanceToLine <= p.radius) {
                    // Geometric offset to find the exact perimeter intersection point
                    const offset = Math.sqrt(p.radius * p.radius - distanceToLine * distanceToLine);
                    const hitDistance = projection - offset;
                    
                    // Track only the closest hit so the laser stops at the FIRST obstacle
                    if (hitDistance < closestDistance) {
                        closestDistance = hitDistance;
                        hitPlayerId = p.id;
                        targetX = player.x + rayX * hitDistance;
                        targetY = player.y + rayY * hitDistance;
                    }
                }
            });

            // Save the coordinates where the visual laser beam will terminate
            activeLaserEnd = { x: targetX, y: targetY };

            // Instantly delete the player that blocked the beam
            if (hitPlayerId !== null) {
                dummyPlayers = dummyPlayers.filter(p => p.id !== hitPlayerId);
            }
        }

        // Game Loop
        function update() {
            // Movement
            if (keys["w"] || keys["arrowup"]) player.y -= player.speed;
            if (keys["s"] || keys["arrowdown"]) player.y += player.speed;
            if (keys["a"] || keys["arrowleft"]) player.x -= player.speed;
            if (keys["d"] || keys["arrowright"]) player.x += player.speed;

            // Boundaries
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            // Countdown the laser flash timer
            if (laserTimer > 0) {
                laserTimer--;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Calculate Aim Angle and Default Laser Path (for the passive red target line)
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            const defaultLength = 1000; 
            const defaultTargetX = player.x + Math.cos(angle) * defaultLength;
            const defaultTargetY = player.y + Math.sin(angle) * defaultLength;

            // Configure Laser Visuals Based on Timer
            if (laserTimer > 0) {
                ctx.strokeStyle = "#ffcc00";       // Bright yellow beam
                ctx.lineWidth = 6;                  // Thick firing beam
                ctx.shadowBlur = 15;                // Laser glow effect
                ctx.shadowColor = "#ffcc00";
                ctx.setLineDash([]);                // Solid line
                
                // Draw Yellow Laser terminating exactly at the hit surface
                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                ctx.lineTo(activeLaserEnd.x, activeLaserEnd.y);
                ctx.stroke();
            } else {
                ctx.strokeStyle = "rgba(255, 0, 0, 0.4)"; // Faint red targeting line
                ctx.lineWidth = 2;                  // Thin guide line
                ctx.shadowBlur = 0;                 // No glow
                ctx.setLineDash([4, 4]);           // Dashed line
                
                // Draw Red Guideline through space
                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                ctx.lineTo(defaultTargetX, defaultTargetY);
                ctx.stroke();
            }

            // Reset visual conditions for drawing standard circles
            ctx.setLineDash([]);
            ctx.shadowBlur = 0;

            // Draw Other Players (Blue Circles)
            ctx.fillStyle = "#0077ff";
            dummyPlayers.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Controlling Player (Red Circle)
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
