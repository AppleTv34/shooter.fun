<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top-Down Laser Shooter</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #222; border: 2px solid #444; cursor: crosshair; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 800;
        canvas.height = 600;

        // Game Objects
        const player = { x: canvas.width / 2, y: canvas.height / 2, radius: 15, speed: 4 };
        const keys = {};
        let mouseX = 0, mouseY = 0;
        let isShooting = false;

        // Input Listeners
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);
        window.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        
        // Shoot on mouse press, stop shooting on release
        window.addEventListener("mousedown", () => isShooting = true);
        window.addEventListener("mouseup", () => isShooting = false);

        // Game Loop
        function update() {
            // Movement
            if (keys["w"] || keys["arrowup"]) player.y -= player.speed;
            if (keys["s"] || keys["arrowdown"]) player.y += player.speed;
            if (keys["a"] || keys["arrowleft"]) player.x -= player.speed;
            if (keys["d"] || keys["arrowright"]) player.x += player.speed;

            // Boundaries
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Calculate Aim Angle and Laser Path
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            const laserLength = 1000; 
            const targetX = player.x + Math.cos(angle) * laserLength;
            const targetY = player.y + Math.sin(angle) * laserLength;

            // Configure Laser Visuals Based on Shooting State
            if (isShooting) {
                ctx.strokeStyle = "#ffcc00";       // Bright yellow beam
                ctx.lineWidth = 6;                  // Thick firing beam
                ctx.shadowBlur = 15;                // Laser glow effect
                ctx.shadowColor = "#ffcc00";
                ctx.setLineDash([]);                // Solid line
            } else {
                ctx.strokeStyle = "rgba(255, 0, 0, 0.4)"; // Faint red targeting line
                ctx.lineWidth = 2;                  // Thin guide line
                ctx.shadowBlur = 0;                 // No glow
                ctx.setLineDash([5, 10]);           // Dashed line
            }

            // Draw Laser
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(targetX, targetY);
            ctx.stroke();

            // Reset effects so they don't apply to the player circle
            ctx.setLineDash([]);
            ctx.shadowBlur = 0;

            // Draw Player (Red Circle)
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
