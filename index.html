<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top-Down Semi-Auto Laser Shooter</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #222; border: 2px solid #444; cursor: crosshair; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 800;
        canvas.height = 600;

        // Game Objects
        const player = { x: canvas.width / 2, y: canvas.height / 2, radius: 15, speed: 4 };
        const keys = {};
        let mouseX = 0, mouseY = 0;
        
        // Dummy Players (Blue Circles)
        const dummyPlayers = [
            { x: 150, y: 150, radius: 15 },
            { x: 650, y: 150, radius: 15 },
            { x: 200, y: 450, radius: 15 },
            { x: 600, y: 450, radius: 15 }
        ];

        // Semi-Auto Weapon Variables
        let laserTimer = 0;          // How long the yellow flash stays on screen
        const laserDuration = 8;    // Frames the yellow laser remains visible

        // Input Listeners
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);
        window.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        
        // Semi-automatic trigger: Fires exactly once per discrete click
        window.addEventListener("mousedown", (e) => {
            if (e.button === 0) { // Left click only
                laserTimer = laserDuration;
            }
        });

        // Game Loop
        function update() {
            // Movement
            if (keys["w"] || keys["arrowup"]) player.y -= player.speed;
            if (keys["s"] || keys["arrowdown"]) player.y += player.speed;
            if (keys["a"] || keys["arrowleft"]) player.x -= player.speed;
            if (keys["d"] || keys["arrowright"]) player.x += player.speed;

            // Boundaries
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            // Countdown the laser flash timer
            if (laserTimer > 0) {
                laserTimer--;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Calculate Aim Angle and Laser Path
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            const laserLength = 1000; 
            const targetX = player.x + Math.cos(angle) * laserLength;
            const targetY = player.y + Math.sin(angle) * laserLength;

            // Configure Laser Visuals Based on Timer
            if (laserTimer > 0) {
                ctx.strokeStyle = "#ffcc00";       // Bright yellow beam
                ctx.lineWidth = 6;                  // Thick firing beam
                ctx.shadowBlur = 15;                // Laser glow effect
                ctx.shadowColor = "#ffcc00";
                ctx.setLineDash([]);                // Solid line
            } else {
                ctx.strokeStyle = "rgba(255, 0, 0, 0.4)"; // Faint red targeting line
                ctx.lineWidth = 2;                  // Thin guide line
                ctx.shadowBlur = 0;                 // No glow
                ctx.setLineDash([4, 4]);           // Dashed line
            }

            // Draw Laser
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(targetX, targetY);
            ctx.stroke();

            // Reset effects so they don't apply to circles
            ctx.setLineDash([]);
            ctx.shadowBlur = 0;

            // Draw Other Players (Blue Circles)
            ctx.fillStyle = "#0077ff";
            dummyPlayers.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Controlling Player (Red Circle)
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
