<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top-Down Shooter with Laser Sight</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #222; border: 2px solid #444; cursor: crosshair; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 800;
        canvas.height = 600;

        // Game Objects
        const player = { x: canvas.width / 2, y: canvas.height / 2, radius: 15, speed: 4 };
        const keys = {};
        const bullets = [];
        let mouseX = 0, mouseY = 0;

        // Input Listeners
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);
        window.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        window.addEventListener("mousedown", () => {
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            bullets.push({
                x: player.x,
                y: player.y,
                vx: Math.cos(angle) * 7,
                vy: Math.sin(angle) * 7,
                radius: 4
            });
        });

        // Game Loop
        function update() {
            // Movement
            if (keys["w"] || keys["arrowup"]) player.y -= player.speed;
            if (keys["s"] || keys["arrowdown"]) player.y += player.speed;
            if (keys["a"] || keys["arrowleft"]) player.x -= player.speed;
            if (keys["d"] || keys["arrowright"]) player.x += player.speed;

            // Boundaries
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            // Move Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].x += bullets[i].vx;
                bullets[i].y += bullets[i].vy;
                if (bullets[i].x < 0 || bullets[i].x > canvas.width || bullets[i].y < 0 || bullets[i].y > canvas.height) {
                    bullets.splice(i, 1);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Laser Aim Indicator
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            // Calculate a point far away along the aim angle
            const laserLength = 1000; 
            const targetX = player.x + Math.cos(angle) * laserLength;
            const targetY = player.y + Math.sin(angle) * laserLength;

            ctx.strokeStyle = "rgba(255, 0, 0, 0.35)"; // Semi-transparent red
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 10]); // Creates a dashed line effect
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(targetX, targetY);
            ctx.stroke();
            ctx.setLineDash([]); // Reset line dash so it doesn't affect other drawings

            // Draw Bullets
            ctx.fillStyle = "#ffcc00";
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Player (Red Circle)
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
