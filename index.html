<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top-Down Laser Shooter with Hit Detection</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #222; border: 2px solid #444; cursor: crosshair; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 800;
        canvas.height = 600;

        // Game Objects
        const player = { x: canvas.width / 2, y: canvas.height / 2, radius: 15, speed: 4 };
        const keys = {};
        let mouseX = 0, mouseY = 0;
        
        // Target Players (Blue Circles)
        let dummyPlayers = [
            { id: 1, x: 150, y: 150, radius: 15 },
            { id: 2, x: 650, y: 150, radius: 15 },
            { id: 3, x: 200, y: 450, radius: 15 },
            { id: 4, x: 600, y: 450, radius: 15 }
        ];

        // Semi-Auto Weapon Variables
        let laserTimer = 0;          // How long the yellow flash stays on screen
        const laserDuration = 8;    // Frames the yellow laser remains visible

        // Input Listeners
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);
        window.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        
        // Semi-automatic trigger: Fires exactly once per discrete click
        window.addEventListener("mousedown", (e) => {
            if (e.button === 0 && laserTimer === 0) { // Left click only when laser isn't active
                laserTimer = laserDuration;
                checkLaserHits();
            }
        });

        // Helper function: Calculates if a line segment intersects a circle
        function checkLaserHits() {
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            const laserLength = 1000; 
            const targetX = player.x + Math.cos(angle) * laserLength;
            const targetY = player.y + Math.sin(angle) * laserLength;

            // Filter out any blue players that get clipped by the beam
            dummyPlayers = dummyPlayers.filter(p => {
                // Vector math to find the closest point on the laser line to the circle center
                const A = player.x - p.x;
                const B = player.y - p.y;
                const C = targetX - player.x;
                const D = targetY - player.y;

                const dot = A * C + B * D;
                const lenSq = C * C + D * D;
                let param = -1;
                
                if (lenSq !== 0) param = dot / lenSq;

                let xx, yy;

                if (param < 0) {
                    xx = player.x;
                    yy = player.y;
                } else if (param > 1) {
                    xx = targetX;
                    yy = targetY;
                } else {
                    xx = player.x + param * C;
                    yy = player.y + param * D;
                }

                const dx = p.x - xx;
                const dy = p.y - yy;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // Keep the player if the distance to the beam is greater than its physical radius
                return distance > p.radius;
            });
        }

        // Game Loop
        function update() {
            // Movement
            if (keys["w"] || keys["arrowup"]) player.y -= player.speed;
            if (keys["s"] || keys["arrowdown"]) player.y += player.speed;
            if (keys["a"] || keys["arrowleft"]) player.x -= player.speed;
            if (keys["d"] || keys["arrowright"]) player.x += player.speed;

            // Boundaries
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            // Countdown the laser flash timer
            if (laserTimer > 0) {
                laserTimer--;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Calculate Aim Angle and Laser Path
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            const laserLength = 1000; 
            const targetX = player.x + Math.cos(angle) * laserLength;
            const targetY = player.y + Math.sin(angle) * laserLength;

            // Configure Laser Visuals Based on Timer
            if (laserTimer > 0) {
                ctx.strokeStyle = "#ffcc00";       // Bright yellow beam
                ctx.lineWidth = 6;                  // Thick firing beam
                ctx.shadowBlur = 15;                // Laser glow effect
                ctx.shadowColor = "#ffcc00";
                ctx.setLineDash([]);                // Solid line
            } else {
                ctx.strokeStyle = "rgba(255, 0, 0, 0.4)"; // Faint red targeting line
                ctx.lineWidth = 2;                  // Thin guide line
                ctx.shadowBlur = 0;                 // No glow
                ctx.setLineDash([5, 5]);           // Dashed line
            }

            // Draw Laser
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(targetX, targetY);
            ctx.stroke();

            // Reset effects so they don't apply to circles
            ctx.setLineDash([]);
            ctx.shadowBlur = 0;

            // Draw Other Players (Blue Circles)
            ctx.fillStyle = "#0077ff";
            dummyPlayers.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Controlling Player (Red Circle)
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
